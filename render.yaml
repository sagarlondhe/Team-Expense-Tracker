services:
  - type: web
    name: team-expense-backend
    env: node
    plan: free
    region: oregon
    branch: main
    rootDirectory: backend
    buildCommand: cd backend && npm ci
    startCommand: cd backend && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "${PORT}"

  - type: static
    name: team-expense-frontend
    plan: free
    region: oregon
    branch: main
    rootDirectory: frontend
    buildCommand: cd frontend && npm ci && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: "https://team-expense-tracker.onrender.com/api"

# Optional managed Postgres (uncomment to create and attach)
# databases:
#   - name: team-expense-db
#     region: oregon
#     plan: starter
#     postgresVersion: "14"

# Note:
# - Render will provide a `DATABASE_URL` env var automatically if you create the Postgres above.
# - This manifest sets the service root to `backend` and runs the build/start commands there.