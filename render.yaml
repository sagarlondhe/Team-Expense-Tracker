# # Optional managed Postgres (uncomment to create and attach)
# # databases:
# #   - name: team-expense-db
# #     region: oregon
# #     plan: starter
# #     postgresVersion: "14"

# # Note:
# # - Render will provide a `DATABASE_URL` env var automatically if you create the Postgres above.
# # - This manifest sets the service root to `backend` and runs the build/start commands there.


services:
  - type: web
    name: team-expense-backend
    env: node
    plan: free
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: FRONTEND_URL
        value: "https://team-expense-tracker-1.onrender.com/"
      - key: DATABASE_URL
        value: "./database/expenses.db"

  - type: static
    name: team-expense-frontend
    plan: free
    region: oregon
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://team-expense-tracker.onrender.com/api"